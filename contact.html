<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜ギガ使用ペースチェッカー</title>
<meta name="description" content="ギガ使用ペースチェッカーへのお問い合わせはこちらから。">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://gigapace-checker.vercel.app/contact.html">

<!-- OGP -->
<meta property="og:title" content="お問い合わせ｜ギガ使用ペースチェッカー">
<meta property="og:type" content="website">
<meta property="og:url" content="https://gigapace-checker.vercel.app/contact.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --yellow:  #ffe600;
  --ink:     #1a1a1a;
  --ink2:    #2e2e2e;
  --bg:      #f5f5f0;
  --surface: #ffffff;
  --border:  #1a1a1a;
  --sub:     #777770;
  --radius:  16px;
}

body.dark {
  --bg:      #111110;
  --surface: #1e1e1c;
  --border:  #ffe600;
  --sub:     #888880;
  --ink:     #f0f0e8;
  --ink2:    #d0d0c8;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  background-image: radial-gradient(circle, #c8c8c0 1px, transparent 1px);
  background-size: 24px 24px;
  color: var(--ink);
  min-height: 100svh;
  transition: background .3s, color .3s;
}
body.dark {
  background-image: radial-gradient(circle, #2a2a28 1px, transparent 1px);
}

/* Header */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: var(--yellow);
  border-bottom: 3px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.hdr-logo {
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 16px;
  color: var(--ink); text-decoration: none;
  white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis;
}
.hdr-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 38px; height: 38px;
  border: 2.5px solid var(--ink); border-radius: 10px;
  background: var(--surface); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink); box-shadow: 3px 3px 0 var(--ink);
  transition: transform .1s, box-shadow .1s;
}
.icon-btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

/* Main */
.main {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 20px 60px;
  display: flex; flex-direction: column; gap: 24px;
}

/* Page hero */
.page-hero {
  background: var(--yellow);
  border: 3px solid var(--ink);
  border-radius: var(--radius);
  padding: 22px 20px;
  box-shadow: 5px 5px 0 var(--ink);
}
.page-category {
  display: inline-block;
  background: var(--ink); color: var(--yellow);
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 11px;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 6px;
  margin-bottom: 10px;
}
.page-title {
  font-family: 'Nunito', sans-serif;
  font-size: 24px; font-weight: 900;
  letter-spacing: -.02em; color: var(--ink);
}

/* Card */
.card {
  background: var(--surface);
  border: 2.5px solid var(--ink);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: 4px 4px 0 var(--ink);
}
.card-title {
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 900;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--sub); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.card-title::before {
  content: '';
  display: block; width: 12px; height: 12px;
  background: var(--yellow);
  border: 2px solid var(--ink); border-radius: 3px;
  flex-shrink: 0;
}

.body-text {
  font-size: 14px; line-height: 1.9; color: var(--ink2);
}
body.dark .body-text { color: var(--ink); }

/* Form wrapper */
.form-wrap {
  background: var(--surface);
  border: 2.5px solid var(--ink);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 4px 4px 0 var(--ink);
}
.form-wrap iframe {
  display: block;
  width: 100%;
  border: none;
}

/* Back link */
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: var(--yellow);
  border-radius: 999px; padding: 12px 24px;
  font-family: 'Nunito', sans-serif;
  font-weight: 900; font-size: 15px;
  text-decoration: none;
  box-shadow: 4px 4px 0 var(--sub);
  transition: all .12s;
}
.back-link:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--sub); }

/* Footer */
footer {
  text-align: center; padding: 28px 20px;
  border-top: 3px solid var(--border);
  background: var(--surface);
  font-size: 13px; color: var(--sub);
}
footer a { color: var(--sub); text-decoration: none; margin: 0 8px; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--yellow);
  padding: 11px 22px; border-radius: 999px;
  font-size: 13px; font-weight: 700;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
  white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="hdr">
  <a href="./top.html" class="hdr-logo">📶 ギガ使用ペースチェッカー</a>
  <div class="hdr-actions">
    <button class="icon-btn" id="darkBtn" onclick="toggleDark()" title="ダークモード">🌙</button>
  </div>
</header>

<main class="main">

  <!-- Hero -->
  <div class="page-hero">
    <span class="page-category">Contact</span>
    <h1 class="page-title">お問い合わせ</h1>
  </div>

  <!-- 案内文 -->
  <div class="card">
    <div class="card-title">ご連絡の前に</div>
    <p class="body-text">
      サイトの内容に関するご意見・ご質問・誤りのご指摘などはこちらからお送りください。<br><br>
      いただいたお問い合わせには順次ご返信いたします。内容によってはご返信までにお時間をいただく場合があります。あらかじめご了承ください。
    </p>
  </div>

  <!-- Googleフォーム -->
  <div class="form-wrap">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSdmlZub_vS82LyIlblVlOqWVKpa9t7QPdMLMnUfWRwEjzuTaw/viewform?embedded=true"
      height="786"
      frameborder="0"
      marginheight="0"
      marginwidth="0">
      読み込んでいます…
    </iframe>
  </div>

  <a href="./top.html" class="back-link">← トップページに戻る</a>

</main>

<footer>
  <p style="margin-bottom:8px;">© ギガ使用ペースチェッカー</p>
  <p>
    <a href="./about.html">運営者情報</a>|
    <a href="./contact.html">お問い合わせ</a>
  </p>
</footer>

<div class="toast" id="toast"></div>

<script>
function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('darkBtn').textContent = isDark ? '☀️' : '🌙';
  try { localStorage.setItem('gigacheck_dark', isDark); } catch(e) {}
}
function loadDark() {
  try {
    if (localStorage.getItem('gigacheck_dark') === 'true') {
      document.body.classList.add('dark');
      document.getElementById('darkBtn').textContent = '☀️';
    }
  } catch(e) {}
}
loadDark();
</script>
</body>
</html>
